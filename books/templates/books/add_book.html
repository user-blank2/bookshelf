{% extends 'books/base.html' %}

{% block title %}Add a Book{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">Add a Book</h1>
    <p class="text-gray-400 mb-8">Track a book you've read or are reading.</p>

    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="text-pink-400 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">
                Save Book
            </button>
        </form>
    </div>
</div>

{% endblock %}
