<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookshelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">📚 My Bookshelf</h1>

        {% if books %}
            {% for book in books %}
            <div class="bg-white rounded-lg shadow p-5 mb-4">
                <h2 class="text-xl font-semibold text-gray-700">{{ book.title }}</h2>
                <p class="text-gray-500">by {{ book.author }}</p>
                <p class="text-yellow-500 mt-1">Rating: {{ book.rating_stars }}</p>
                {% if book.notes %}
                <p class="text-gray-600 mt-2 text-sm">{{ book.notes }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <a href="{% url 'add_book' %}" 
                class="inline-block mb-6 bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700"> 
                ➕ Add a Book
            </a>
        {% else %}
            <p class="text-gray-500">No books yet. Add one!</p>
        {% endif %}

    </div>

</body>
</html>
