<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Bookshelf{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7C3AED',
                        secondary: '#EC4899',
                    }
                }
            }
        }
    </script>
    <style>
      input, textarea, select {
          width: 100%;
          background-color: #111827;
          border: 1px solid #374151;
          color: white;
          padding: 0.625rem 0.875rem;
          border-radius: 0.5rem;
          outline: none;
          transition: border-color 0.2s;
      }
      input:focus, textarea:focus, select:focus {
          border-color: #7C3AED;
      }
  </style>
</head>
<body class="bg-gray-950 min-h-screen text-white">

    <!-- Navbar -->
    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="{% url 'book_list' %}"
               class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                📚 Bookshelf
            </a>
            <a href="{% url 'add_book' %}"
               class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition">
                ➕ Add Book
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
