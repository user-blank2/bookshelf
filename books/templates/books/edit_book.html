{% extends 'books/base.html' %}

{% block title %}Edit {{ book.title }}{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto">
    <h1 class="text-4xl font-bold mb-2">Edit Book</h1>
    <p class="text-gray-400 mb-8">Updating — {{ book.title }}</p>

    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-300 mb-2">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="text-pink-400 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex gap-3">
                <button type="submit"
                    class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:opacity-90 transition">
                    Save Changes
                </button>
                <a href="{% url 'book_list' %}"
                    class="flex-1 text-center bg-gray-800 text-gray-300 py-3 rounded-lg font-medium hover:bg-gray-700 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
